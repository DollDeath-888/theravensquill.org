/* 4. Menu Navigation Section Setup */

      <script>
        // PASTE YOUR MP3 AUDIO LINKS INSIDE THE QUOTES BELOW
        const playlist = [
            "https://litter.catbox.moe/fm7gcpioe0zmg9vd.mp3"
      
        ];

        let currentTrackIndex = 0;
        const audio = document.getElementById('bg-audio-engine');

        // Initialize the audio track source
        function loadTrack(index) {
            if (playlist[index] && playlist[index] !== "") {
                audio.src = playlist[index];
            }
        }

        // Attempt to play automatically as soon as user interacts with the document container
        function startAutoplay() {
            audio.play().then(() => {
                // Success: remove listeners once audio is streaming cleanly
                document.removeEventListener('click', startAutoplay);
                document.removeEventListener('keydown', startAutoplay);
            }).catch(error => {
                console.log("Autoplay blocked by browser policy. Awaiting user interaction context.");
            });
        }

        // Cycle cleanly forward automatically when a song reaches natural completion elements
        audio.addEventListener('ended', () => {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            loadTrack(currentTrackIndex);
            audio.play();
        });

        // Initialize first configuration array values
        loadTrack(currentTrackIndex);

        // Listen for standard browser input interaction rules to clear sound restrictions natively
        document.addEventListener('click', startAutoplay);
        document.addEventListener('keydown', startAutoplay);
    </script>
      
</body>
